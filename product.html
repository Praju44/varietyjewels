<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Jewelry Collection | Variety Jewels</title>

<meta name="description" content="Explore premium stainless jewelry collection from Variety Jewels including necklaces, rings, bracelets and earrings.">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #333;
}

header {
    background: linear-gradient(to right, #ffffff, #f4e4a6);
    padding: 25px;
    text-align: center;
    border-bottom: 2px solid gold;
}

header h1 {
    color: #b8860b;
    letter-spacing: 2px;
}

nav {
    background: #b8860b;
    text-align: center;
    padding: 14px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 25px;
    font-weight: bold;
}

nav a:hover {
    color: black;
}

.section {
    padding: 60px 40px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

.product {
    background: #fffdf7;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    overflow: hidden;
    transition: 0.3s;
}

.product:hover {
    transform: translateY(-5px);
}

.product img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.product-info {
    padding: 20px;
    text-align: center;
}

.product-info h3 {
    color: #b8860b;
}

.price {
    font-size: 18px;
    font-weight: bold;
    margin: 10px 0;
}

button {
    background: gold;
    border: none;
    padding: 12px 20px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: black;
    color: white;
}

footer {
    background: #b8860b;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
<h1>Variety Jewels Collection</h1>
<p>Premium Stainless Jewelry</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="about.html">About</a>
</nav>

<section class="section">

<div class="products">

<!-- Necklace -->
<div class="product">
<img src="https://images.unsplash.com/photo-1611599537845-1c7aca0091c0" alt="Gold Necklace">
<div class="product-info">
<h3>Royal Gold Necklace</h3>
<p class="price">Rs 1500</p>
<button>Add to Cart</button>
</div>
</div>

<!-- Ring -->
<div class="product">
<img src="https://images.unsplash.com/photo-1588444650700-6b6e2f1d8c89" alt="Diamond Ring">
<div class="product-info">
<h3>Elegant Diamond Ring</h3>
<p class="price">Rs 1000</p>
<button>Add to Cart</button>
</div>
</div>

<!-- Bracelet -->
<div class="product">
<img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f" alt="Bracelet">
<div class="product-info">
<h3>Luxury Bracelet</h3>
<p class="price">Rs 1200</p>
<button>Add to Cart</button>
</div>
</div>

<!-- Earrings -->
<div class="product">
<img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba3" alt="Earrings">
<div class="product-info">
<h3>Golden Drop Earrings</h3>
<p class="price">Rs 800</p>
<button>Add to Cart</button>
</div>
</div>

</div>

</section>

<footer>
© 2026 Variety Jewels | All Rights Reserved
</footer>

</body>
</html>
